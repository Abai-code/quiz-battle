<!DOCTYPE html>
<html lang="kk">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz Battle | Профиль</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/theme.js" defer></script>
  <script src="js/auth.js" defer></script>
  <script src="js/main.js" defer></script>
</head>

<body>
  <header>
    <h1>Quiz Battle</h1>
    <nav>
      <a href="index.html">Басты бет</a>
      <a href="about.html">Біз туралы</a>
      <a href="services.html">Қызметтер</a>
      <a href="quiz.html">Quiz/Сұрақтар</a>
      <a href="quiz-react.html">Ойын</a>
      <a href="admin-react.html">Админ</a>
      <a href="ranking.html">Рейтинг</a>
      <a href="blog.html">Блог</a>
      <a href="contact.html">Байланыс</a>
      <a href="profile.html" class="active" id="nav-profile">Профиль</a>
      <button class="theme-toggle" onclick="toggleTheme()">🌓 Theme</button>
    </nav>
  </header>

  <main class="page-container">
    <h2 class="page-title">Сіздің профиліңіз</h2>

    <div class="profile-card card">
      <div class="avatar">👤</div>
      <h3 id="user-profile-name">Абай (Жаңа ойыншы)</h3>
      <p style="opacity: 0.6; margin-bottom: 20px;">Тіркелген күні: 17 Сәуір 2026</p>

      <div class="stats-grid">
        <div class="stat-item">
          <h4 id="profile-total">0</h4>
          <p>Барлық сұрақтар</p>
        </div>
        <div class="stat-item">
          <h4 id="profile-score">0</h4>
          <p>Дұрыс жауаптар</p>
        </div>
        <div class="stat-item">
          <h4 id="profile-rank">#--</h4>
          <p>Орныңыз</p>
        </div>
      </div>
    </div>
  </main>

  <footer>
    <p> Quiz Battle. 2026 Абай </p>
  </footer>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Қолданушы мәліметтерін алу
      const storedUser = JSON.parse(localStorage.getItem('user'));
      if (!storedUser) return; // Жүйеге кірмеген болса, ештеңе істемейміз

      // Атын шығару
      document.getElementById('user-profile-name').innerText = storedUser.name;

      // Рейтинг базасын алу
      const leaderboard = JSON.parse(localStorage.getItem('leaderboard')) || [];
      
      // Рейтингті сұрыптау (орынды дұрыс анықтау үшін)
      leaderboard.sort((a, b) => b.score - a.score || parseInt(b.percent) - parseInt(a.percent));

      // Осы қолданушының рейтингтегі орнын іздеу
      const playerIndex = leaderboard.findIndex(p => p.name === storedUser.name);

      if (playerIndex !== -1) {
        const playerData = leaderboard[playerIndex];
        
        // Экранға мәліметтерді шығару
        document.getElementById('profile-total').innerText = playerData.total; // Жауап берген барлық сұрақтары
        document.getElementById('profile-score').innerText = playerData.score; // Дұрыс жауаптары
        document.getElementById('profile-rank').innerText = "#" + (playerIndex + 1); // Рейтингтегі орны
      }
    });
  </script>
</body>

</html>
